<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Login & Registration</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
<div class="container">
<a class="navbar-brand" href="#">Prasanna Portal</a>
</div>
</nav>

<div class="container mt-5">
<div class="row">

<div class="col-md-6 mb-4">
<div class="card shadow p-4">

<h2 class="text-center mb-4">Login</h2>

<input type="email" class="form-control mb-3" placeholder="Email">

<div class="input-group mb-3">
<input type="password" id="loginPass" class="form-control" placeholder="Password">
<button class="btn btn-secondary" onclick="toggleLogin()">Show</button>
</div>

<button class="btn btn-primary w-100">Login</button>

</div>
</div>

<div class="col-md-6">
<div class="card shadow p-4">

<h2 class="text-center mb-4">Register</h2>

<input type="text" id="username" class="form-control mb-3" placeholder="Username">

<input type="email" class="form-control mb-3" placeholder="Email">

<input type="password" id="pass1" class="form-control mb-3" placeholder="Password">

<input type="password" id="pass2" class="form-control mb-3" placeholder="Confirm Password">

<p id="msg"></p>

<button class="btn btn-success w-100" onclick="checkPassword()">
Register
</button>

</div>
</div>

</div>
</div>

<footer class="text-center mt-5 p-3 bg-dark text-white">
Task-2 ApexPlanet Internship
</footer>

<script src="script.js"></script>

</body>
</html>
